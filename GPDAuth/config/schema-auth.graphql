type Query {
login(username: String!, password: String!): AuthenticatedUser
getSessionData: AuthenticatedUser @deprecated(reason: "Alias of getAuthenticatedUser. Will be removed in future versions.")
getAuthenticatedUser: AuthenticatedUser
}

type AuthenticatedUser{
fullName: String!
firstName: String!
lastName: String
username: String!
email: String
picture: String
roles: [String!]!
permissions: [String!]!
}